name: nexora
description: Next-Gen AI Prompt Platform

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0

  # Local Storage
  shared_preferences: ^2.2.2

  # UI & Media
  google_fonts: ^6.1.0
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  font_awesome_flutter: ^10.7.0
  webview_flutter: ^4.9.0
  webview_flutter_android: ^3.12.0
  webview_flutter_wkwebview: ^3.9.2
  
  # Native Video Support
  video_player: ^2.8.1
  chewie: ^1.7.1

  cached_network_image: ^3.3.1
  photo_view: ^0.14.0
  carousel_slider: ^4.2.1
  flutter_rating_bar: ^4.0.1
  in_app_review: ^2.0.9

  # Image Upload & Selection
  cloudinary_public: ^0.21.0
  image_picker: ^1.0.7

  # Utilities
  clipboard: ^0.1.3
  share_plus: ^7.2.1
  intl: ^0.19.0
  url_launcher: ^6.2.5
  crypto: ^3.0.3
  flutter_cache_manager: ^3.3.1
  flutter_dotenv: ^5.1.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false 
  image_path: "assets/icon.jpg"
  adaptive_icon_background: "#E57F7A" 
  adaptive_icon_foreground: "assets/icon.jpg"

flutter:
  uses-material-design: true
  assets:

    - assets/icon.jpg
    - assets/priya.jpg
    - assets/jigar.jpg
    - assets/mulogo.png
    - .env
    - assets/generated_images.json
