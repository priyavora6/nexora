name: nexora
description: Next-Gen AI Prompt Platform

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0

  # Local Storage
  shared_preferences: ^2.2.2

  # UI
  google_fonts: ^6.1.0
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  # ✅ ADDED: Extra icons for AI/Tech designs
  font_awesome_flutter: ^10.7.0
  webview_flutter: ^4.4.2
  webview_flutter_android: ^3.12.0
  webview_flutter_wkwebview: ^3.9.2

  # Utilities
  clipboard: ^0.1.3
  share_plus: ^7.2.1
  intl: ^0.19.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  # ✅ ADDED: Tool to generate Launcher Icons
  flutter_launcher_icons: ^0.13.1

# ✅ UPDATED: Launcher Icon Configuration
flutter_launcher_icons:
  android: true
  ios: false # Disabled iOS as the directory does not exist
  image_path: "assets/icon.jpeg"
  adaptive_icon_background: "#E57F7A" # lightCoral from AppColors
  adaptive_icon_foreground: "assets/icon.jpeg"

flutter:
  uses-material-design: true

  # ✅ ADDED: Assets folder for your icon image
  assets:
    - assets/icon.png
    - assets/icon.jpeg
